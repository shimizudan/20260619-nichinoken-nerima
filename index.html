<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おにぎり最適化チャレンジ！</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: linear-gradient(135deg, #fff9e6 0%, #ffe0b2 100%);
      min-height: 100vh;
      padding: 16px;
    }

    header {
      text-align: center;
      padding: 20px 16px 12px;
    }
    header h1 {
      font-size: 2rem;
      color: #d84315;
      text-shadow: 1px 1px 0 #fff;
    }
    header p {
      color: #5d4037;
      font-size: 0.95rem;
      margin-top: 6px;
    }

    /* 固定バー */
    #summary-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff3e0;
      border-bottom: 3px solid #ff8f00;
      padding: 10px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    #summary-bar .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 100px;
    }
    #summary-bar .stat-label {
      font-size: 0.75rem;
      color: #795548;
      font-weight: bold;
    }
    #summary-bar .stat-value {
      font-size: 1.6rem;
      font-weight: bold;
      color: #e65100;
    }
    #summary-bar .stat-value.over {
      color: #c62828;
      animation: shake 0.3s;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)}
    }
    #budget-bar-wrap {
      flex: 1;
      min-width: 200px;
    }
    #budget-bar-wrap label {
      font-size: 0.75rem;
      color: #795548;
      font-weight: bold;
    }
    #budget-bar {
      width: 100%;
      height: 18px;
      border-radius: 9px;
      background: #ffcc80;
      overflow: hidden;
      margin-top: 4px;
      border: 1px solid #ff8f00;
    }
    #budget-fill {
      height: 100%;
      background: linear-gradient(90deg, #66bb6a, #ffa726);
      transition: width 0.3s, background 0.3s;
      border-radius: 9px;
    }
    #budget-fill.over { background: linear-gradient(90deg, #ef5350, #c62828); }

    #reset-btn {
      background: #ef5350;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    #reset-btn:hover { background: #c62828; }

    /* グリッド */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      max-width: 1100px;
      margin: 20px auto 0;
      padding: 0 4px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 14px 10px 12px;
      text-align: center;
      cursor: pointer;
      border: 3px solid transparent;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      user-select: none;
      position: relative;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 5px 14px rgba(0,0,0,0.18); }
    .card.selected {
      border-color: #43a047;
      background: #f1f8e9;
      box-shadow: 0 0 0 2px #43a047, 0 4px 10px rgba(67,160,71,0.25);
    }
    .card.disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .card .check-badge {
      display: none;
      position: absolute;
      top: 6px; right: 8px;
      background: #43a047;
      color: white;
      border-radius: 50%;
      width: 22px; height: 22px;
      font-size: 13px;
      line-height: 22px;
    }
    .card.selected .check-badge { display: block; }

    .card .emoji { font-size: 2rem; margin-bottom: 4px; }
    .card .name { font-size: 0.82rem; font-weight: bold; color: #4e342e; margin-bottom: 6px; }
    .card .price-tag {
      background: #fff3e0;
      border: 1px solid #ffcc80;
      border-radius: 20px;
      display: inline-block;
      padding: 2px 10px;
      font-size: 0.85rem;
      font-weight: bold;
      color: #e65100;
      margin-bottom: 4px;
    }
    .card .cal-tag {
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      border-radius: 20px;
      display: inline-block;
      padding: 2px 10px;
      font-size: 0.85rem;
      font-weight: bold;
      color: #2e7d32;
    }
    .card .ratio {
      font-size: 0.7rem;
      color: #9e9e9e;
      margin-top: 4px;
    }

    /* 選択リスト */
    #selected-section {
      max-width: 1100px;
      margin: 28px auto 0;
      padding: 0 4px;
    }
    #selected-section h2 {
      font-size: 1.1rem;
      color: #5d4037;
      margin-bottom: 10px;
    }
    #selected-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .sel-chip {
      background: #fff;
      border: 2px solid #43a047;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.82rem;
      color: #2e7d32;
      font-weight: bold;
    }
    #no-selection {
      color: #bdbdbd;
      font-size: 0.9rem;
    }

    footer {
      text-align: center;
      padding: 30px 16px 20px;
      font-size: 0.75rem;
      color: #a1887f;
    }
  </style>
</head>
<body>

<header>
  <h1>🍙 おにぎり最適化チャレンジ！</h1>
  <p>予算 <strong>500円</strong> でカロリーができるだけ多くなるように選ぼう！<br>
  おにぎりをタップ／クリックして選択・解除できます。</p>
</header>

<div id="summary-bar">
  <div class="stat">
    <span class="stat-label">💰 合計金額</span>
    <span class="stat-value" id="total-price">0円</span>
  </div>
  <div class="stat">
    <span class="stat-label">🔥 合計カロリー</span>
    <span class="stat-value" id="total-cal">0 kcal</span>
  </div>
  <div class="stat">
    <span class="stat-label">🍙 個数</span>
    <span class="stat-value" id="total-count">0個</span>
  </div>
  <div id="budget-bar-wrap">
    <label>残り予算</label>
    <div id="budget-bar"><div id="budget-fill" style="width:100%"></div></div>
    <div style="font-size:0.75rem;color:#795548;margin-top:3px;">残り <span id="remaining">500</span>円</div>
  </div>
  <button id="reset-btn">リセット</button>
</div>

<div id="grid"></div>

<div id="selected-section">
  <h2>✅ 選んだおにぎり</h2>
  <div id="selected-list"><span id="no-selection">まだ選んでいません</span></div>
</div>

<footer>
  城北中学校・高等学校 数学科 校長 清水 団 ／ 日能研練馬 体験授業 2026.6.20
</footer>

<script>
const BUDGET = 500;

const onigiri = [
  { id:  1, name: "しおむすび",         emoji: "🍙", price:  90, cal: 160 },
  { id:  2, name: "梅干し",             emoji: "🍙", price: 100, cal: 170 },
  { id:  3, name: "おかか",             emoji: "🍙", price: 100, cal: 175 },
  { id:  4, name: "昆布",               emoji: "🍙", price: 110, cal: 168 },
  { id:  5, name: "ツナマヨ",           emoji: "🍙", price: 130, cal: 245 },
  { id:  6, name: "えびマヨ",           emoji: "🍙", price: 140, cal: 255 },
  { id:  7, name: "からあげ",           emoji: "🍙", price: 150, cal: 310 },
  { id:  8, name: "焼きさけ",           emoji: "🍙", price: 120, cal: 195 },
  { id:  9, name: "明太子",             emoji: "🍙", price: 140, cal: 210 },
  { id: 10, name: "チーズいそべ",       emoji: "🍙", price: 135, cal: 270 },
  { id: 11, name: "豚の生姜焼き",       emoji: "🍙", price: 160, cal: 340 },
  { id: 12, name: "チキン南蛮",         emoji: "🍙", price: 160, cal: 325 },
  { id: 13, name: "焼肉カルビ",         emoji: "🍙", price: 170, cal: 370 },
  { id: 14, name: "かにかまマヨ",       emoji: "🍙", price: 125, cal: 230 },
  { id: 15, name: "わさびまぐろ",       emoji: "🍙", price: 150, cal: 220 },
  { id: 16, name: "ちりめんじゃこ",     emoji: "🍙", price: 115, cal: 178 },
  { id: 17, name: "五目ごはん",         emoji: "🍙", price: 120, cal: 200 },
  { id: 18, name: "炊き込みわかめ",     emoji: "🍙", price: 110, cal: 182 },
  { id: 19, name: "スパムたまご",       emoji: "🍙", price: 180, cal: 390 },
  { id: 20, name: "焼きおにぎり",       emoji: "🔥", price: 130, cal: 215 },
];

const selected = new Set();

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const totalCost = [...selected].reduce((s, id) => s + onigiri[id-1].price, 0);

  onigiri.forEach(o => {
    const isSel = selected.has(o.id);
    const wouldOver = !isSel && (totalCost + o.price > BUDGET);
    const ratio = (o.cal / o.price).toFixed(2);

    const card = document.createElement('div');
    card.className = 'card' + (isSel ? ' selected' : '') + (wouldOver ? ' disabled' : '');
    card.innerHTML = `
      <span class="check-badge">✓</span>
      <div class="emoji">${o.emoji}</div>
      <div class="name">${o.id}. ${o.name}</div>
      <div class="price-tag">💰 ${o.price}円</div><br>
      <div class="cal-tag">🔥 ${o.cal} kcal</div>
      <div class="ratio">効率: ${ratio} kcal/円</div>
    `;
    card.addEventListener('click', () => {
      if (selected.has(o.id)) {
        selected.delete(o.id);
      } else {
        const cost = [...selected].reduce((s,id) => s + onigiri[id-1].price, 0);
        if (cost + o.price > BUDGET) return;
        selected.add(o.id);
      }
      render();
    });
    grid.appendChild(card);
  });

  updateSummary(totalCost);
  updateSelectedList();
}

function updateSummary(totalCost) {
  const totalCal = [...selected].reduce((s, id) => s + onigiri[id-1].cal, 0);
  const count = selected.size;
  const remaining = BUDGET - totalCost;
  const pct = Math.min(100, (totalCost / BUDGET) * 100);
  const over = totalCost > BUDGET;

  document.getElementById('total-price').textContent = totalCost + '円';
  document.getElementById('total-price').className = 'stat-value' + (over ? ' over' : '');
  document.getElementById('total-cal').textContent = totalCal.toLocaleString() + ' kcal';
  document.getElementById('total-count').textContent = count + '個';
  document.getElementById('remaining').textContent = remaining;
  document.getElementById('budget-fill').style.width = pct + '%';
  document.getElementById('budget-fill').className = over ? 'over' : '';
}

function updateSelectedList() {
  const list = document.getElementById('selected-list');
  if (selected.size === 0) {
    list.innerHTML = '<span id="no-selection">まだ選んでいません</span>';
    return;
  }
  list.innerHTML = [...selected].sort((a,b)=>a-b).map(id => {
    const o = onigiri[id-1];
    return `<span class="sel-chip">${o.emoji} ${o.name} (${o.price}円/${o.cal}kcal)</span>`;
  }).join('');
}

document.getElementById('reset-btn').addEventListener('click', () => {
  selected.clear();
  render();
});

render();
</script>
</body>
</html>
